<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Love Story</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap');

body {
    margin: 0;
    background: #061b14;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Playfair Display', serif;
}

/* BOOK WRAPPER */
.book {
    width: 420px;
    height: 560px;
    position: relative;
    perspective: 2000px;
}

/* COVER */
.cover {
    width: 100%;
    height: 100%;
    background: #0b2b22;
    border-radius: 10px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    position: absolute;
    transform-origin: left;
    transition: transform 1.5s ease;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: #d6b36a;
    text-align: center;
}

.cover h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 40px;
}

.cover p {
    font-size: 14px;
}

/* OPEN ANIMATION */
.book.open .cover {
    transform: rotateY(-160deg);
}

/* INNER PAGES */
.pages {
    width: 100%;
    height: 100%;
    background: #f5efe6;
    border-radius: 10px;
    position: absolute;
    padding: 25px;
    box-sizing: border-box;
    opacity: 0;
    transition: 1s;
}

.book.open .pages {
    opacity: 1;
}

/* PASSWORD SCREEN */
.lock-screen {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
}

input {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #caa76a;
    width: 80%;
    margin-top: 10px;
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    background: #0b2b22;
    color: #d6b36a;
    border-radius: 8px;
    cursor: pointer;
}

/* SCRAPBOOK PAGES */
.scrap {
    display: none;
    height: 100%;
}

.scrap.active {
    display: block;
}

/* PAGE STYLE */
.page {
    display: flex;
    justify-content: space-between;
    height: 100%;
    gap: 20px;
}

.left, .right {
    width: 48%;
    background: #fffaf3;
    border-radius: 10px;
    padding: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
    position: relative;
}

h2 {
    font-size: 16px;
    color: #0b2b22;
}

textarea {
    width: 100%;
    height: 80%;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
}

/* NAV */
.nav {
    position: absolute;
    bottom: 10px;
    width: 90%;
    display: flex;
    justify-content: space-between;
}

.nav button {
    background: #0b2b22;
    color: #d6b36a;
    border-radius: 5px;
    padding: 5px 10px;
}
</style>
</head>

<body>

<div class="book" id="book">

    <!-- COVER -->
    <div class="cover">
        <h1>Our Love Story</h1>
        <p>A scrapbook of us ♥</p>
        <button onclick="openBook()">Open Book</button>
    </div>

    <!-- PAGES -->
    <div class="pages">

        <!-- PASSWORD -->
        <div class="lock-screen" id="lock">
            <h2>Enter Password</h2>
            <input type="password" id="pass" placeholder="Password"/>
            <button onclick="checkPass()">Unlock</button>
        </div>

        <!-- SCRAPBOOK -->
        <div class="scrap" id="scrap">

            <!-- PAGE 1 -->
            <div class="page active" id="p1">
                <div class="left">
                    <h2>Chapter 1 - How we started</h2>
                    <textarea placeholder="Write here..."></textarea>
                </div>
                <div class="right">
                    <h2>Memory</h2>
                    <textarea></textarea>
                </div>
            </div>

            <!-- PAGE 2 -->
            <div class="page" id="p2" style="display:none;">
                <div class="left">
                    <h2>Chapter 2</h2>
                    <textarea></textarea>
                </div>
                <div class="right">
                    <h2>Memory</h2>
                    <textarea></textarea>
                </div>
            </div>

        </div>

        <!-- NAV -->
        <div class="nav" id="nav" style="display:none;">
            <button onclick="prev()">Back</button>
            <button onclick="next()">Next</button>
        </div>

    </div>
</div>

<script>
let current = 1;

function openBook() {
    document.getElementById("book").classList.add("open");
}

function checkPass() {
    const pass = document.getElementById("pass").value;
    if(pass === "JoashManicum") {
        document.getElementById("lock").style.display = "none";
        document.getElementById("scrap").classList.add("active");
        document.getElementById("nav").style.display = "flex";
    } else {
        alert("Wrong password");
    }
}

function showPage(n){
    document.querySelectorAll(".page").forEach(p => p.style.display="none");
    document.getElementById("p"+n).style.display="flex";
}

function next(){
    if(current < 2){
        current++;
        showPage(current);
    }
}

function prev(){
    if(current > 1){
        current--;
        showPage(current);
    }
}
</script>

</body>
</html>
