<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Scrapbook Book</title>
<style>
body {
  margin: 0;
  background: #1a1a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* BOOK SHELL */
.book {
  width: 900px;
  height: 600px;
  position: relative;
  perspective: 2000px;
}

/* COVER FRONT */
.cover {
  position: absolute;
  width: 50%;
  height: 100%;
  background: #0b3d2e; /* dark forest green */
  left: 50%;
  transform-origin: left;
  transition: transform 1.2s ease;
  z-index: 20;
  border-radius: 10px 0 0 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 28px;
  cursor: pointer;
}

/* BACK COVER */
.back-cover {
  position: absolute;
  width: 50%;
  height: 100%;
  background: #0b3d2e;
  left: 0;
  z-index: 1;
  border-radius: 0 10px 10px 0;
}

/* PASSWORD SCREEN */
.lock-screen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 30;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
}

.lock-screen input {
  padding: 10px;
  font-size: 18px;
  margin-top: 10px;
}

/* PAGES */
.page {
  position: absolute;
  width: 50%;
  height: 100%;
  background: #f3e7c9;
  transform-origin: left;
  transition: transform 1s ease, z-index 0.2s;
  left: 50%;
  z-index: 5;
  border-left: 2px solid #ccc;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* LEFT STACK (read pages) */
.left-stack {
  position: absolute;
  width: 50%;
  height: 100%;
  left: 0;
  background: #e9dbc0;
  z-index: 2;
  overflow: hidden;
}

/* POLAROID */
.polaroid {
  width: 180px;
  height: 220px;
  background: white;
  padding: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

.photo {
  width: 100%;
  height: 150px;
  background: #ccc;
}

.caption {
  font-size: 12px;
  text-align: center;
}

/* OPEN STATE */
.book.open .cover {
  transform: rotateY(-180deg);
}

/* FLIPPED PAGE */
.flipped {
  transform: rotateY(-180deg);
  z-index: 1;
}
</style>
</head>
<body>

<div class="book" id="book">

  <!-- PASSWORD SCREEN -->
  <div class="lock-screen" id="lock">
    <h2>Enter Password</h2>
    <input type="password" id="password" placeholder="Password"/>
    <button onclick="unlock()">Unlock</button>
  </div>

  <!-- FRONT COVER -->
  <div class="cover" onclick="openBook()">
    📖 My Scrapbook
  </div>

  <!-- BACK COVER -->
  <div class="back-cover"></div>

  <!-- LEFT STACK -->
  <div class="left-stack" id="leftStack"></div>

  <!-- PAGES -->
  <div id="pages"></div>

</div>

<script>
const PASSWORD = "JoashManicum";
let currentPage = 0;
const totalPages = 15;

const pagesContainer = document.getElementById("pages");
const leftStack = document.getElementById("leftStack");
const book = document.getElementById("book");

function unlock() {
  const input = document.getElementById("password").value;
  if (input === PASSWORD) {
    document.getElementById("lock").style.display = "none";
  } else {
    alert("Wrong password");
  }
}

function openBook() {
  book.classList.add("open");

  // create pages dynamically
  for (let i = 0; i < totalPages; i++) {
    const page = document.createElement("div");
    page.className = "page";
    page.style.zIndex = totalPages - i;

    page.innerHTML = `
      <div class="polaroid">
        <div class="photo"></div>
        <div class="caption">Memory ${i + 1}</div>
      </div>
    `;

    page.onclick = () => flipPage(page, i);
    pagesContainer.appendChild(page);
  }
}

function flipPage(page, index) {
  if (index !== currentPage) return;

  page.classList.add("flipped");

  // move to left stack
  setTimeout(() => {
    const clone = page.cloneNode(true);
    clone.classList.remove("flipped");
    clone.style.transform = "none";
    clone.style.position = "relative";
    clone.style.margin = "10px";
    leftStack.appendChild(clone);
    page.style.display = "none";
  }, 600);

  currentPage++;

  // if finished all pages, close book
  if (currentPage === totalPages) {
    setTimeout(() => {
      book.classList.remove("open");
      alert("You finished the scrapbook ❤️");
    }, 1200);
  }
}
</script>

</body>
</html>
